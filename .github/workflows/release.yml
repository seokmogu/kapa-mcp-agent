name: Build and release Windows agent

# Push a tag like v0.2.0 to trigger a release build.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install pyinstaller
          python -m pip install ".[probe]"

      - name: Build kapa-agent.exe
        run: >
          python -m PyInstaller --clean --noconfirm --onefile
          --name kapa-agent
          --collect-submodules pywinauto
          --collect-submodules comtypes
          --collect-submodules uvicorn
          --collect-submodules fastapi
          --collect-submodules pydantic
          --collect-submodules starlette
          --collect-submodules anyio
          --collect-submodules mss
          --collect-submodules PIL
          --collect-submodules psutil
          --collect-submodules pyperclip
          --hidden-import win32timezone
          --hidden-import win32gui
          --hidden-import win32ui
          --hidden-import win32con
          run_agent.py

      - name: Build kapa-watchdog.exe
        run: >
          python -m PyInstaller --clean --noconfirm --onefile
          --name kapa-watchdog
          run_watchdog.py

      - name: Compute checksums
        shell: pwsh
        run: |
          $agent = "dist/kapa-agent.exe"
          $watch = "dist/kapa-watchdog.exe"
          (Get-FileHash $agent -Algorithm SHA256).Hash.ToLower() + "  kapa-agent.exe" | Out-File -Encoding ascii dist/kapa-agent.exe.sha256
          (Get-FileHash $watch -Algorithm SHA256).Hash.ToLower() + "  kapa-watchdog.exe" | Out-File -Encoding ascii dist/kapa-watchdog.exe.sha256

      - name: Stage portable bundle
        shell: pwsh
        run: |
          $stage = "dist/portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item dist/kapa-agent.exe $stage
          Copy-Item dist/kapa-watchdog.exe $stage
          Copy-Item config.example.json $stage
          Copy-Item ../recipes -Destination $stage/recipes -Recurse
          Compress-Archive -Path "$stage/*" -DestinationPath dist/kapa-agent-portable.zip -Force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            windows-agent/dist/kapa-agent.exe
            windows-agent/dist/kapa-agent.exe.sha256
            windows-agent/dist/kapa-watchdog.exe
            windows-agent/dist/kapa-watchdog.exe.sha256
            windows-agent/dist/kapa-agent-portable.zip
